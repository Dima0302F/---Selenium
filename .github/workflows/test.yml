name: Тестирование и публикация Allure отчета

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Первый job: Запуск тестов
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Установка Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Запуск тестов с Allure
      run: |
        pytest test_form.py -v --alluredir=allure-results --clean-alluredir
      continue-on-error: true  # Продолжаем даже если тесты упали
    
    - name: Сохранение результатов тестов
      uses: actions/upload-artifact@v4
      if: always()  # Сохраняем даже при ошибках
      with:
        name: allure-results
        path: allure-results
        retention-days: 30

  # Второй job: Генерация и публикация отчета
  generate-report:
    needs: test  # Ждем завершения job test
    runs-on: ubuntu-latest
    if: always()  # Запускаем даже если тесты упали
    
    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4
    
    - name: Загрузка результатов тестов
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results
    
    - name: Установка Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y allure
    
    - name: Генерация Allure отчета
      run: |
        allure generate allure-results -o allure-report --clean
    
    - name: Сохранение Allure отчета
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        retention-days: 30
    
    - name: Публикация на GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        keep_files: false
