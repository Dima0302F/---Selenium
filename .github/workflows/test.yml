name: Тестирование и публикация Allure отчета

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Установка Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Запуск тестов
      run: |
        pytest test_form.py -v --alluredir=allure-results --clean-alluredir
      continue-on-error: true
    
    - name: Сохранение результатов
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results
        retention-days: 30

  generate-report:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    
    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4
    
    - name: Загрузка результатов
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results
    
    - name: Установка Java
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jre-headless
    
    - name: Установка Allure
      run: |
        curl -Lo allure.zip https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
        unzip allure.zip
        sudo mv allure-2.27.0 /opt/allure
        sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
    
    - name: Генерация отчета
      run: |
        /usr/local/bin/allure generate allure-results -o allure-report --clean
    
    - name: Сохранение отчета
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
    
    - name: Деплой на GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        force_orphan: true
