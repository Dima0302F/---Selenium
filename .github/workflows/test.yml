name: Тестирование и публикация Allure отчета

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Установка Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Запуск тестов с Allure
      run: |
        pytest test_form.py -v --alluredir=allure-results --clean-alluredir
      continue-on-error: true
    
    - name: Сохранение результатов тестов
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results
        retention-days: 30

  generate-report:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 👈 ДОБАВЛЕНО: права на запись для деплоя
    if: always()
    
    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4
    
    - name: Загрузка результатов тестов
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results
    
    - name: Установка Java
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jre-headless
        java -version
    
    - name: Установка Allure
      run: |
        # Скачиваем Allure
        curl -Lo allure.zip https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
        unzip allure.zip
        sudo mv allure-2.27.0 /opt/allure
        # Создаем символическую ссылку
        sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
        # Добавляем в PATH для текущего runner
        echo "/opt/allure/bin" >> $GITHUB_PATH
        # Проверяем установку
        /usr/local/bin/allure --version
    
    - name: Диагностика установки Allure
      run: |
        echo "=== Поиск allure ==="
        which allure || echo "allure not in PATH"
        echo "=== Версия Allure ==="
        /usr/local/bin/allure --version
        echo "=== Проверка PATH ==="
        echo $PATH
        echo "=== Проверка Java ==="
        java -version
        echo "=== Содержимое allure-results ==="
        ls -la allure-results/ | head -20
        echo "=== Количество файлов ==="
        echo "Всего файлов: $(ls -1 allure-results/ | wc -l)"
    
    - name: Генерация Allure отчета
      run: |
        /usr/local/bin/allure generate allure-results -o allure-report --clean
        echo "Отчет сгенерирован, проверяем содержимое:"
        ls -la allure-report/ | head -10
    
    - name: Сохранение Allure отчета
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        retention-days: 30
    
    - name: Публикация на GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy Allure report'
